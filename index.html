<!DOCTYPE html>
<html lang="es">
<head>

  <link rel="stylesheet" href="styles.css" />
</head>

          <div class="stats-summary-item">

            <strong>28,78661625</strong>
          </div>
          <div class="stats-summary-item">
            <span>Desviación Estándar</span>

          </div>
          <div class="stats-summary-item">
            <span>Varianza</span>
            <strong>49,8775</strong>
          </div>
          <div class="stats-summary-item">
            <span>Cuartiles (IQR)</span>
            <strong>-0,016860395</strong>

            <span>Coef. de Asimetría</span>

</html>
